name: Run Kotlin Scripts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  run-scripts:
    name: "Run all Kotlin scripts"
    runs-on: ubuntu-24.04

    services:
      bitcoin-regtest:
        image: ghcr.io/thunderbiscuit/podman-regtest-infinity-pro:0.3.2
        ports:
          - 18443:18443
          - 18444:18444
          - 3002:3002
          - 3003:3003
          - 60401:60401
        # The container initialization step will wait until everything is ready before allowing other steps to run
        options: >-
          --health-cmd "test $(bitcoin-cli -regtest -rpcuser=regtest -rpcpassword=password getblockcount) -gt 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    steps:
      - name: "Checkout PR branch"
        uses: actions/checkout@v4

      - name: "Script 1"
        id: s1
        continue-on-error: true
        run: kotlinc -script kotlin/1.balance.main.kts

      - name: "Script 2"
        id: s2
        continue-on-error: true
        run: kotlinc -script kotlin/2.blockinfo.main.kts

      - name: "Script 3"
        id: s3
        continue-on-error: true
        run: kotlinc -script kotlin/3.getaddress.main.kts

      - name: "Script 4"
        id: s4
        continue-on-error: true
        run: kotlinc -script kotlin/4.opreturn.main.kts

      - name: "Script 5"
        id: s5
        continue-on-error: true
        run: kotlinc -script kotlin/5.listunspentutxo.main.kts

      - name: "Script 6"
        id: s6
        continue-on-error: true
        run: kotlinc -script kotlin/6.descriptor-from-mnemonic.main.kts

      - name: "Script 7"
        id: s7
        continue-on-error: true
        run: kotlinc -script kotlin/7.public-descriptor-template.main.kts

      - name: "Script 8"
        id: s8
        continue-on-error: true
        run: kotlinc -script kotlin/8.transaction-details.main.kts

      - name: "Script 9"
        id: s9
        continue-on-error: true
        run: kotlinc -script kotlin/9.private-descriptor-template.main.kts

      - name: "Script 10"
        id: s10
        continue-on-error: true
        run: kotlinc -script kotlin/10.create-tx-from-raw-bytes.main.kts

      - name: "Script 11"
        id: s11
        continue-on-error: true
        run: kotlinc -script kotlin/11.derive-custom-path.main.kts

      - name: "Script 12"
        id: s12
        continue-on-error: true
        run: kotlinc -script kotlin/12.basic-transaction.main.kts

      - name: "Fail if any script failed"
        if: always()
        run: |
          outcomes="${{ steps.s1.outcome }} ${{ steps.s2.outcome }} ${{ steps.s3.outcome }} ${{ steps.s4.outcome }} ${{ steps.s5.outcome }} ${{ steps.s6.outcome }} ${{ steps.s7.outcome }} ${{ steps.s8.outcome }} ${{ steps.s9.outcome }} ${{ steps.s10.outcome }} ${{ steps.s11.outcome }} ${{ steps.s12.outcome }}"
          if echo "$outcomes" | grep -q "failure"; then
            echo "One or more scripts failed."
            exit 1
          fi
