name: Run Swift Scripts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  run-scripts:
    name: "Run all Swift scripts"
    runs-on: macos-15

    steps:
      - name: "Checkout PR branch"
        uses: actions/checkout@v4

      - name: "Start regtest container"
        run: |
          docker run -d \
            -p 18443:18443 \
            -p 18444:18444 \
            -p 3002:3002 \
            -p 3003:3003 \
            -p 60401:60401 \
            ghcr.io/thunderbiscuit/podman-regtest-infinity-pro:0.3.2
          until docker exec $(docker ps -q) bitcoin-cli -regtest -rpcuser=regtest -rpcpassword=password getblockcount > /dev/null 2>&1; do
            echo "Waiting for regtest node..."
            sleep 3
          done

      - name: "Install swift-sh"
        run: brew install mxcl/made/swift-sh

      - name: "Run all Swift scripts"
        run: |
          failed=0
          for script in $(find swift -name "*.swift" | sort); do
            echo "::group::$script"
            swift sh "$script" || failed=1
            echo "::endgroup::"
          done
          exit $failed
