name: Run Swift Scripts (Ubuntu)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  run-scripts:
    name: "Run all Swift scripts"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout PR branch"
        uses: actions/checkout@v4

      - name: "Install Swift"
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: "Install swift-sh"
        run: |
          git clone https://github.com/mxcl/swift-sh.git /tmp/swift-sh
          cd /tmp/swift-sh
          swift build -c release
          sudo cp .build/release/swift-sh /usr/local/bin/swift-sh

      - name: "Start regtest container"
        run: |
          CONTAINER_ID=$(podman run -d \
            -p 18443:18443 \
            -p 18444:18444 \
            -p 3002:3002 \
            -p 3003:3003 \
            -p 60401:60401 \
            ghcr.io/thunderbiscuit/podman-regtest-infinity-pro:0.3.2)
          until podman exec $CONTAINER_ID bitcoin-cli -regtest -rpcuser=regtest -rpcpassword=password getblockcount > /dev/null 2>&1; do
            echo "Waiting for regtest node..."
            sleep 3
          done

      - name: "Run all Swift scripts"
        run: |
          failed=0
          for script in $(find swift -name "*.swift" | sort); do
            echo "::group::$script"
            swift sh "$script" || failed=1
            echo "::endgroup::"
          done
          exit $failed
